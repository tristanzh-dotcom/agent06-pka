<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PKA 配置</title>
  <link rel="stylesheet" href="static/style.css?v=20260617-async-ocr">
</head>
<body data-page="settings">
  <main class="shell">
    <section class="panel diagnostic-panel">
      <h1>连接诊断</h1>
      <p class="diagnostic-copy">测试问答链路所需组件的当前可用状态。固定模型栈在页面底部状态栏展示。</p>
      <div class="diagnostic-actions">
        <button type="button" id="test-connection">测试连通性</button>
      </div>
      <pre id="settings-feedback" class="feedback diagnostic-list">点击“测试连通性”查看 DeepSeek、OCR 与本地向量检索状态。</pre>
    </section>
    <details class="panel danger-zone">
      <summary class="danger-summary">
        <span class="danger-title">危险操作</span>
        <span class="danger-meta">测试或维护时展开，清空全部已索引内容。</span>
      </summary>
      <section class="danger-body">
        <p>清空知识库中所有已索引的内容。此操作不可撤销。</p>
        <label class="danger-confirm">
          输入“清空知识库”确认
          <input id="clear-confirmation" data-confirm-phrase="清空知识库" type="text" autocomplete="off">
        </label>
        <button type="button" id="clear-knowledge" disabled>清空知识库</button>
        <pre id="clear-feedback" class="feedback"></pre>
      </section>
    </details>
  </main>
  <script src="static/app.js?v=20260617-async-ocr"></script>
</body>
</html>
