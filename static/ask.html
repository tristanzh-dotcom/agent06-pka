<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PKA 问答</title>
  <link rel="stylesheet" href="static/style.css?v=20260713-destination-controls">
</head>
<body data-page="ask">
  <main class="ask-workbench">
    <header class="ask-header">
      <h1>知识库问答</h1>
      <button type="button" id="new-conversation" class="new-conversation">新建对话</button>
      <div class="exportbar" id="export-bar" style="display:none">
        <button type="button" id="export-word">导出 Word</button>
        <span class="answer-destination-divider" aria-hidden="true"></span>
        <button type="button" id="save-local-asset" class="answer-destination" disabled>
          保存到本地资料
        </button>
        <button type="button" id="publish-obsidian" class="answer-destination" disabled>
          发布到 Obsidian
        </button>
        <button type="button" id="add-pka-retrieval" class="answer-destination answer-destination--primary" disabled>
          加入 PKA 问答检索
        </button>
      </div>
    </header>
    <div id="answer-operation-feedback" class="feedback" role="status" aria-live="polite"></div>
    <div id="conversation" class="ask-conversation">
      <div id="empty-state" class="empty-chips">
        <button type="button" class="empty-chip">我之前关于组织架构的看法是什么？</button>
        <button type="button" class="empty-chip">总结一下我最近录入的所有内容</button>
        <button type="button" class="empty-chip">基于我的笔记，给出当前的技术选型建议</button>
      </div>
    </div>
    <form id="query-form" class="ask-input-bar">
      <fieldset class="language-switch" id="language-switch">
        <label><input type="radio" name="language" value="zh" checked> 中文建议</label>
        <label><input type="radio" name="language" value="en"> English Report</label>
      </fieldset>
      <input id="question-input" type="text" placeholder="基于历史内容提问">
      <button type="submit">发送</button>
    </form>
  </main>
  <script src="static/app.js?v=20260715-bounded-session"></script>
</body>
</html>
